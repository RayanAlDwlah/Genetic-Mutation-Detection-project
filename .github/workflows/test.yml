name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements-lock.txt"

      - name: Install OS-level dependencies
        # liblzma / dssp are required by the same code paths Docker installs.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends liblzma-dev dssp

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt

      - name: Sanity — tokenizer stack loads
        run: |
          python -c "import lzma; print('lzma OK')"
          python -c "from transformers import AutoTokenizer; print('transformers OK')"

      - name: Leakage gate (CLI)
        run: |
          python -m src.verify_no_leakage

      - name: pytest (with coverage)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/ -n auto --cov-report=xml

      - name: Upload coverage to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
