name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff-and-black:
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements-lock.txt"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.15.11 black==26.3.1 mypy==1.20.1

      - name: ruff check
        run: ruff check src/ tests/ scripts/

      - name: black --check
        run: black --check src/ tests/ scripts/

      - name: mypy (non-blocking — we enforce strict per-file over time)
        continue-on-error: true
        run: mypy src/ || true
